services:
  # MongoDB Datenbank (ARM64 kompatibel für Raspberry Pi 4)
  mongodb:
    image: mongo:4.4.18
    container_name: rheinzel-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - rheinzel-network
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rheinzel-backend
    restart: unless-stopped
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=rheinzelmaenner
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - CORS_ORIGINS=*
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - avatar_data:/app/data/avatars
    networks:
      - rheinzel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # React Frontend mit Nginx (Traefik-ready)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rheinzel-frontend
    restart: unless-stopped
    volumes:
      - ./frontend/nginx.traefik.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - rheinzel-network
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rheinzel.rule=Host(`rhnzl.sau-index.de`)"
      - "traefik.http.routers.rheinzel.entrypoints=web"
      - "traefik.http.services.rheinzel.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-network"

  # Automatische Datenbank-Backups
  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: sau-index_backup
    restart: unless-stopped
    environment:
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - DB_NAME=rheinzelmaenner
    volumes:
      - /mnt/backups/mongodb:/backups
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - rheinzel-network

volumes:
  mongodb_data:
  avatar_data:

networks:
  rheinzel-network:
    driver: bridge
  traefik-network:
    external: true
